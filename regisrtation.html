<body> 
 
<h2>Student Registration Form</h2> 
 
<form> 
 
    <label for=" Student name">Name:</label> 
    <input type="text" name="#" id="#" placeholder="Enter Your name"> <br><br>

    <input type="text" name="#" id="#" placeholder="Enter Your Mother's name"> <br><br>


    <label for="Father's name">Father's name:</label>

    <input type="tel" name="#" id="#" placeholder="Enter Your Mobail number"> <br><br>

 
    <label>Gender</label>

    <input type="radio" name="gender"> Female <br><br>

    <input type="date" name="#" id="#" placeholder="Enter Your Date of birth"> <br><br>

    <select> 
        <option>Computer Science</option> 
        <option>IT</option> 
        <option>EN-TC</option> 
    </select> <br><br>
 

 
    <lable>Hobbies: </lable>
    <input type="checkbox"> Reading 
    <input type="checkbox"> Sports 
    <input type="checkbox"> Music <br><br> 
 
    <lable>Address:</lable> 
    <textarea rows="2" cols="30"></textarea> <br><br> 

    <label for="#">Upload photo:</label>
    <input type="file" name="#" id="#" placeholder="Upload your photo"> <br><br>

 

 
    <br><br>

    <input type="reset" value="Reset"> 
 
</form>
