<!DOCTYPE html>
<html>
<head>
    <title>HTML Links Example</title>
</head>
<body>
    <h1>HTml Links Demo</h1>

        google
        </a>

        <!--Internal Links-->
        <a href="about.html">
            about Us
        </a>

            Email Us
        </a>

            call Us
        </a>

        </a>

        <h2 id="bottom">Bottom of page</h2>
</body>
</html>
