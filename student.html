<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regisrtation Form</title>
</head>
<body>
    <h1>Registration Form</h1>
    <form>
    <label for="#">Name:</label>
    <input type="text" name="#" id="#" placeholder="Enter Your Name"> <br><br>

    <label for="#">Email</label>
    <input type="email" name="#" id="#" placeholder="Enter Your Email"> <br><br>

    <label for="#">Mobile:</label>
    <input type="tel" name="#" id="#" placeholder="Enter Your Mobile Number"> <br><br>

    <label for="#">Password:</label>
    <input type="password" name="#" id="#" placeholder="Enter Your Password"> <br><br>
    
    <label for="#">Confirm Password:</label>
    <input type="password" name="#" id="#" placeholder="Re-Enter Password"> <br><br>



    <input type="submit" value="Submit">
    <input type="reset" value="Reset"> 
    </form>
</body>
</html>
